<html>
    <head><title>学生信息注册页面</title></head>
    <body>
        <h3 align="center" >学生信息注册</h3>
        <table>
        <tr>
            <td>姓名：</td><td><input type="text" name="student"></td>
        </tr>
        <tr>
            <td>性别：</td>
            <td><input type="radio" name="Sex" >男
                     <input type="radio" name="Sex" >女
            </td>
        </tr>
        <tr>
            <td>出生日期：</td>
            <td><input type="text" name="shri"></td>
            <td>按格式yyyy-mm-dd</td>
        </tr>
        <tr>
            <td>学校：</td>
            <td><input type="text" name="xuexiao"></td>
        </tr>
        <tr>
            <td>专业</td>
            <td><select name="zhuanye">
                        <option selected>计算机科学与技术</option>
                        <option>网络工程</option>
                        <option>智慧林业</option>
                        <option>遥感技术</option>
            </td> 
        </tr>
        <tr>
            <td>体育特长：</td>
            <td><input type="checkbox" name="tiyu" >篮球
                    <input type="checkbox" name="tiyu" >排球
                    <input type="checkbox" name="tiyu" >足球
                    <input type="checkbox" name="tiyu" >游泳
            </td>
        </tr>
        <tr>
            <td>体育特长：</td>
            <td><input type="file" name="techang"></td>
        </tr>
        <tr>
            <td>密码：</td>
            <td><input type="password"></td>
        </tr>
        <tr>
            <td>个人介绍：</td>
            <td colspan="2"><textarea name="jieshao"></td>
        </tr>
        <tr>
            <td><input type="submit"></td>
            <td><input type="reset"></td>
        </tr>
        </table>
        
    </body>


</html>
